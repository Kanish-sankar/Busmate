name: Functions Deploy Guard

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: busmate_app/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud (dev)
        id: auth-dev
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions to dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-dev.outputs.credentials_file_path }}
        run: firebase deploy --project busmate-dev --only functions --non-interactive --force

  deploy-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: busmate_app/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud (prod)
        id: auth-prod
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions to prod
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-prod.outputs.credentials_file_path }}
        run: firebase deploy --project busmate-b80e8 --only functions --non-interactive --force
